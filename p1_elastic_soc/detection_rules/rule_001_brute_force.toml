[rule]
id = "rule-001-brute-force"
name = "Brute Force Login Attempt"
description = "Detects multiple failed authentication attempts indicating a brute force attack"
risk_score = 73
severity = "high"
type = "query"
language = "kuery"
query = "event.category:authentication AND event.outcome:failure AND winlog.event_id:4625"
tags = ["brute-force", "authentication", "T1110"]
enabled = true
from = "now-5m"
interval = "1m"

[[rule.threat]]
framework = "MITRE ATT&CK"
[[rule.threat.technique]]
id = "T1110"
name = "Brute Force"
reference = "https://attack.mitre.org/techniques/T1110/"
