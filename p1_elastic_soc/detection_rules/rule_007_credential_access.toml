[rule]
id = "rule-007-credential-access"
name = "LSASS Memory Dump Detected"
description = "Detects attempts to dump LSASS memory for credential harvesting"
risk_score = 95
severity = "critical"
type = "query"
language = "kuery"
query = "event.category:process AND process.name:(procdump.exe OR mimikatz.exe OR lsass.exe) AND event.action:access AND process.pid:* AND target.process.name:lsass.exe"
tags = ["credential-access", "lsass", "T1003"]
enabled = true
from = "now-5m"
interval = "1m"

[[rule.threat]]
framework = "MITRE ATT&CK"
[[rule.threat.technique]]
id = "T1003"
name = "OS Credential Dumping"
reference = "https://attack.mitre.org/techniques/T1003/"
